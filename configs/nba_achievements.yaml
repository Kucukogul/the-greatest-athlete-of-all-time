# NBA Achievement Data
# Version: v1
# Source: Basketball-Reference
# Coverage: NBA only — ABA achievements excluded (affects Julius Erving)
# Join key: player_id — matches nba_all_seasons_raw.csv
# Players absent from this file default to 0 for all achievement metrics.

meta:
  version: v1
  last_updated: "2026-06-14"
  source: Basketball-Reference
  coverage: "NBA regular season and playoffs only. ABA statistics excluded."
  join_key: player_id
  aba_exclusion_note: >
    Julius Erving won 3 ABA MVPs (1974–76) and 3 ABA championships (1974, 1976) not counted here.
    All fields reflect NBA-only career achievements.

# ─────────────────────────────────────────────────────────────────
# Field Definitions
# championships          — NBA championship titles won
# mvp_awards             — Regular Season MVP awards
# finals_mvp             — NBA Finals MVP awards
# all_nba_1st_team       — All-NBA First Team selections
# all_nba_2nd_team       — All-NBA Second Team selections
# all_star_selections    — All-Star Game selections
# dpoy_awards            — Defensive Player of the Year awards
# all_defensive_1st_team — NBA All-Defensive First Team selections
# ─────────────────────────────────────────────────────────────────

